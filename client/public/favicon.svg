    <path d="M 5 30 L 20 140 Q 20 150 30 150 L 85 150 Q 95 150 95 140 L 110 30 Z" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Grid pattern inside cart -->
    <rect x="30" y="50" width="18" height="30" fill="white" opacity="0.7"/>
    <rect x="52" y="50" width="18" height="30" fill="white" opacity="0.7"/>
    <rect x="74" y="50" width="18" height="30" fill="white" opacity="0.7"/>
    <rect x="30" y="85" width="18" height="30" fill="white" opacity="0.7"/>
    <rect x="52" y="85" width="18" height="30" fill="white" opacity="0.7"/>
    <rect x="74" y="85" width="18" height="30" fill="white" opacity="0.7"/>
    
    <!-- Wheels -->
    <circle cx="40" cy="170" r="14" fill="#22c55e"/>
    <circle cx="75" cy="170" r="14" fill="#22c55e"/>
  </g>
  
  <!-- M letter in red -->
  <path d="M 320 390 L 320 140 L 380 140 L 430 250 L 480 140 L 540 140 L 540 390 L 485 390 L 485 220 L 440 320 L 420 320 L 375 220 L 375 390 Z" fill="#dc2626"/>
  
