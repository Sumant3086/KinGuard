<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background with slight rounded corners -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  
  <!-- K letter in red -->
  <path d="M 80 140 L 80 390 L 140 390 L 140 290 L 200 390 L 280 390 L 200 270 L 270 140 L 190 140 L 140 230 L 140 140 Z" fill="#dc2626"/>
  
  <!-- Shopping cart in green -->
